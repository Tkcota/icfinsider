<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <rect width="100" height="100" rx="10" fill="#111111"/>
  <!-- ICF in white, large and centered -->
  <text
    x="50"
    y="50"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="46"
    letter-spacing="2"
    fill="#FFFFFF">ICF</text>
  <!-- Orange accent bar — wider than ICF, tight below text -->
  <rect x="4" y="68" width="92" height="4" rx="2" fill="#E8780A"/>
</svg>
