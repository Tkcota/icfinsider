# Cloudflare Pages — D1 binding configuration
# Binds the DB variable to the icfinsider-leads D1 database
# so functions/api/submit.js can store form submissions.

name = "icfinsider"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "icfinsider-leads"
database_id = "33d040e1-3f3f-4e31-8009-7573b4a12c35"
